<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShainiDG</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="index.js" defer></script>
</head>
<body>
<video autoplay muted loop playsinline id="bg-video" aria-hidden="true">
    <source src="videoclip/BackGround.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="audio-controls" aria-label="Audio controls">
    <button id="toggleAudio" type="button" aria-label="Toggle music">
        <i class="fa-solid fa-volume-xmark"></i>
    </button>
    <div class="volume-slider-container">
        <input type="range" id="volumeSlider" min="0" max="100" value="50" aria-label="Music volume">
    </div>
</div>

<main class="page-shell">
    <section class="profile-card" aria-label="ShainiDG profile">
        <div class="avatar-frame">
            <img src="img/avatar.jpg" alt="ShainiDG avatar">
        </div>

        <p class="eyebrow">Personal page</p>
        <h1>ShainiDG</h1>
        <p class="tagline">My links, projects and creative space in one clean place.</p>

        <a class="primary-link" href="https://github.com/DavydGromosiak" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-github"></i>
            <span>Open GitHub</span>
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>

        <div class="social-links" aria-label="Social links">
            <a class="social-link telegram" href="https://t.me/ShainiDG" target="_blank" rel="noopener noreferrer"
               aria-label="Open Telegram" title="Telegram">
                <i class="fa-brands fa-telegram"></i>
            </a>
            <a class="social-link discord" href="https://discord.com/users/1229508026180833382" target="_blank"
               rel="noopener noreferrer" aria-label="Open Discord" title="Discord">
                <i class="fa-brands fa-discord"></i>
            </a>
            <a class="social-link github" href="https://github.com/DavydGromosiak" target="_blank"
               rel="noopener noreferrer" aria-label="Open GitHub" title="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
        </div>
    </section>
</main>
</body>
</html>
