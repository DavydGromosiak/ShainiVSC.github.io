<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#05070c">

    <title>Shaini</title>
    <meta name="title" content="Shaini">
    <meta name="description" content="Shaini">

    <link rel="icon" type="image/gif" href="favicon/favicon.gif">
    <link rel="apple-touch-icon" href="favicon/favicon.gif">
    <link rel="shortcut icon" type="image/gif" href="favicon/favicon.gif">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="index.js" defer></script>
</head>
<body>
<video autoplay muted loop playsinline id="bg-video" aria-hidden="true">
    <source src="videoclip/BackGround.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="volume-mixer" aria-label="Volume mixer">
    <i id="volumeIcon" class="fa-solid fa-volume-high" aria-hidden="true"></i>
    <input type="range" id="volumeSlider" min="0" max="100" value="55" aria-label="Music volume">
</div>

<main class="page-shell">
    <section class="profile-card" aria-label="ShainiDG profile">
        <div class="avatar-frame">
            <img src="img/avatar.jpg" alt="ShainiDG avatar">
        </div>

        <h1>𝚂𝚑𝚊𝚒𝚗𝚒♡</h1>
        <p class="location">
            <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
            <span>Stuttgart, Germany</span>
        </p>

        <div class="social-links" aria-label="Social links">
            <a class="social-link telegram" href="https://t.me/ShainiDG" target="_blank" rel="noopener noreferrer"
               aria-label="Open Telegram" title="Telegram">
                <i class="fa-brands fa-telegram"></i>
            </a>
            <a class="social-link discord" href="https://discord.com/users/1229508026180833382" target="_blank"
               rel="noopener noreferrer" aria-label="Open Discord" title="Discord">
                <i class="fa-brands fa-discord"></i>
            </a>
            <a class="social-link github" href="https://github.com/DavydGromosiak" target="_blank"
               rel="noopener noreferrer" aria-label="Open GitHub" title="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
            <a class="social-link instagram" href="https://www.instagram.com/shaini.dg/" target="_blank"
               rel="noopener noreferrer" aria-label="Open Instagram" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a class="social-link email" href="mailto:davyd.gromosiak@icloud.com" aria-label="Send email" title="Email">
                <i class="fa-regular fa-envelope"></i>
            </a>
        </div>

        <div class="view-count" aria-label="250 profile views">
            <i class="fa-solid fa-eye" aria-hidden="true"></i>
            <span>250</span>
        </div>
    </section>
</main>

<section class="music-player" aria-label="Music player">
    <img id="trackCover" class="track-cover" src="img/track-cover.jpg" alt="i miss you cover">
    <div class="track-main">
        <div class="track-topline">
            <a id="trackTitle" class="track-title"
               href="https://open.spotify.com/track/021sNzTndU8LVmDJDqvwXp?si=5535235871bc4bc9"
               target="_blank" rel="noopener noreferrer">
                i miss you
            </a>
            <a id="trackExternalLink" class="spotify-link"
               href="https://open.spotify.com/track/021sNzTndU8LVmDJDqvwXp?si=5535235871bc4bc9"
               target="_blank" rel="noopener noreferrer" aria-label="Open on Spotify" title="Spotify">
                <i class="fa-brands fa-spotify"></i>
            </a>
        </div>
        <div class="track-progress-row">
            <span id="currentTime">0:00</span>
            <input type="range" id="progressSlider" min="0" max="100" value="0" step="0.1" aria-label="Track progress">
            <span id="durationTime">0:00</span>
        </div>
    </div>
    <div class="player-actions">
        <button id="previousTrack" class="player-button secondary" type="button" aria-label="Previous track">
            <i class="fa-solid fa-backward-step"></i>
        </button>
        <button id="toggleAudio" class="player-button primary" type="button" aria-label="Play music">
            <i class="fa-solid fa-play"></i>
        </button>
        <button id="nextTrack" class="player-button secondary" type="button" aria-label="Next track">
            <i class="fa-solid fa-forward-step"></i>
        </button>
    </div>
</section>
</body>
</html>
